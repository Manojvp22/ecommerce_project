{% extends "products/base.html" %}

{% block title %}Reset Link Sent{% endblock %}

{% block content %}
<div class="auth-shell d-flex align-items-center">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-7 col-lg-5">
        <div class="auth-panel p-4 p-md-5 text-center">
          <div class="shop-kicker mb-2">Check your email</div>
          <h1 class="h3 fw-bold mb-3">Reset link sent</h1>
          <p class="text-muted">If that email matches an account, a password reset link has been sent.</p>
          <a href="{% url 'login' %}" class="btn btn-primary w-100 py-2">Back to Login</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
