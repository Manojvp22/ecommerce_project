{% extends "products/base.html" %}

{% block title %}Order Success{% endblock %}

{% block content %}
<div class="shop-page">
  <div class="container">
    <div class="shop-surface p-5 text-center">
      <div class="shop-kicker mb-2">Order confirmed</div>
      <h1 class="fw-bold mb-3">Order Placed Successfully</h1>
      <p class="text-muted mb-4">Thank you for your purchase.</p>
      <div class="d-flex flex-column flex-sm-row justify-content-center gap-2">
        <a href="{% url 'order_history' %}" class="btn btn-primary px-4 py-2">
          View Orders
        </a>
        <a href="{% url 'product_list' %}" class="btn btn-outline-secondary px-4 py-2">
          Continue Shopping
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
