<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{% block title %}E-Commerce{% endblock %}</title>

    <!-- Bootstrap 5 CDN -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
    <style>
      :root {
        --shop-ink: #17202a;
        --shop-muted: #637381;
        --shop-primary: #0f766e;
        --shop-primary-dark: #115e59;
        --shop-accent: #f59e0b;
        --shop-soft: #eef7f3;
        --shop-line: #d8e6df;
      }

      body {
        background: #f6faf8;
        color: var(--shop-ink);
      }

      .navbar.shop-navbar {
        background: linear-gradient(90deg, #12312d, #0f766e);
        box-shadow: 0 8px 24px rgba(15, 118, 110, 0.16);
      }

      .navbar-brand {
        font-weight: 700;
        letter-spacing: 0;
      }

      .btn-primary,
      .btn-success {
        background-color: var(--shop-primary);
        border-color: var(--shop-primary);
      }

      .btn-primary:hover,
      .btn-success:hover {
        background-color: var(--shop-primary-dark);
        border-color: var(--shop-primary-dark);
      }

      .btn-warning {
        background-color: var(--shop-accent);
        border-color: var(--shop-accent);
        color: #221400;
      }

      .shop-page {
        background: linear-gradient(180deg, #f6faf8 0%, #ffffff 55%, #f6faf8 100%);
        margin: -1.5rem 0 0;
        min-height: calc(100vh - 72px);
        padding: 32px 0 48px;
      }

      .shop-surface {
        background: #ffffff;
        border: 1px solid var(--shop-line);
        border-radius: 8px;
        box-shadow: 0 16px 42px rgba(23, 32, 42, 0.08);
      }

      .shop-kicker {
        color: var(--shop-primary);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .auth-shell {
        background:
          linear-gradient(135deg, rgba(15, 118, 110, 0.92), rgba(18, 49, 45, 0.94)),
          url("https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?auto=format&fit=crop&w=1400&q=80");
        background-position: center;
        background-size: cover;
        margin: -1.5rem 0 0;
        min-height: calc(100vh - 72px);
        padding: 48px 0;
      }

      .container > .auth-shell,
      .container > .shop-page {
        margin-left: calc(50% - 50vw);
        margin-right: calc(50% - 50vw);
        width: 100vw;
      }

      .auth-panel {
        background: #ffffff;
        border-radius: 8px;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.22);
      }

      .auth-panel input {
        border: 1px solid #cfded7;
        border-radius: 8px;
        min-height: 44px;
        padding: 0.55rem 0.75rem;
        width: 100%;
      }

      .auth-panel input:focus {
        border-color: var(--shop-primary);
        box-shadow: 0 0 0 0.18rem rgba(15, 118, 110, 0.16);
        outline: 0;
      }

      .product-media {
        aspect-ratio: 1 / 1;
        background: var(--shop-soft);
        object-fit: contain;
        width: 100%;
      }

      .cart-thumb {
        background: var(--shop-soft);
        height: 64px;
        object-fit: contain;
        width: 64px;
      }

      .password-field-wrap {
        position: relative;
      }

      .password-field-wrap input {
        padding-right: 48px;
      }

      .password-toggle {
        align-items: center;
        background: transparent;
        border: 0;
        color: var(--shop-primary);
        display: flex;
        height: 42px;
        justify-content: center;
        position: absolute;
        right: 2px;
        top: 1px;
        width: 44px;
      }

      .product-row-image {
        background: var(--shop-soft);
        height: 220px;
        object-fit: contain;
        width: 100%;
      }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark shop-navbar mb-4">
  <div class="container">
    <a class="navbar-brand" href="{% url 'product_list' %}">My Shop</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
            aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" href="{% url 'product_list' %}">Products</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'cart_view' %}">Cart</a>
        </li>
      </ul>

      <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
        {% if user.is_authenticated %}
          <li class="nav-item">
            <span class="navbar-text me-3">
              Hello, {{ user.username }}!
            </span>
          </li>
          <li class="nav-item">
            <a class="btn btn-outline-light btn-sm" href="{% url 'logout' %}">Logout</a>
          </li>
        {% else %}
          <li class="nav-item me-2">
            <a class="btn btn-outline-light btn-sm" href="{% url 'login' %}">Login</a>
          </li>
          <li class="nav-item">
            <a class="btn btn-warning btn-sm" href="{% url 'register' %}">Register</a>
          </li>
        {% endif %}
      </ul>
    </div>
  </div>
</nav>

<div class="container">
    <!-- Django messages -->
    {% if messages %}
        <div class="mt-2">
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        </div>
    {% endif %}

    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.querySelectorAll('.auth-panel input[type="password"]').forEach(function(input) {
    var wrapper = document.createElement('div');
    var button = document.createElement('button');

    wrapper.className = 'password-field-wrap';
    input.parentNode.insertBefore(wrapper, input);
    wrapper.appendChild(input);

    button.type = 'button';
    button.className = 'password-toggle';
    button.innerHTML = '&#128065;';
    button.setAttribute('aria-label', 'Show password');
    wrapper.appendChild(button);

    button.addEventListener('click', function() {
      var isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      button.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
    });
  });
</script>
</body>
</html>
